<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 480px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid #e8e8e8;
  box-shadow: 0 8px 40px rgba(0,0,0,0.07);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #1a5fa8, #2e86de, #54a0ff);
}
.brand { margin-bottom: 28px; }
.brand-letters {
  display: flex;
  justify-content: center;
  gap: 2px;
  margin-bottom: 6px;
}
.brand-letters span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1a5fa8;
  line-height: 1;
  letter-spacing: 6px;
}
.brand-sub { font-size: 11px; color: #aaa; letter-spacing: 3px; text-transform: uppercase; }
.brand-line { width: 40px; height: 1px; background: #1a5fa8; margin: 14px auto 0; opacity: 0.4; }
.login-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px;
}
.login-sub { font-size: 13px; font-weight: 300; color: #999; margin-bottom: 28px; line-height: 1.5; }
#google-btn-container { display: flex; justify-content: center; margin-bottom: 20px; }
.footer-note { font-size: 11px; color: #ccc; margin-top: 4px; }
#perfil { display: none; flex-direction: column; align-items: center; gap: 10px; }
#no-acceso { display: none; flex-direction: column; align-items: center; gap: 12px; }
.no-acceso-icon { font-size: 40px; }
.no-acceso-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: #1a1a2e; }
.no-acceso-sub { font-size: 13px; color: #999; line-height: 1.6; }
.btn-pagar {
  background: #1a5fa8; color: white; border: none;
  font-family: 'Outfit', sans-serif; font-size: 13px;
  padding: 10px 28px; border-radius: 10px; cursor: pointer;
  text-decoration: none; display: inline-block;
}
.avatar-wrap { position: relative; margin-bottom: 4px; }
.user-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid #e8f0fe; }
.avatar-check {
  position: absolute; bottom: 2px; right: 2px;
  width: 20px; height: 20px; background: #1a5fa8;
  border-radius: 50%; border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white;
}
.welcome-tag {
  background: #f0f6ff; color: #1a5fa8; font-size: 11px; font-weight: 500;
  padding: 4px 16px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
}
.user-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: #1a1a2e; }
.user-email { font-size: 12px; color: #aaa; }
.cursos-titulo { font-size: 12px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; }
.cursos-lista { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.curso-card {
  background: #f7faff; border: 1px solid #e0ecff; border-radius: 12px;
  padding: 14px 18px; display: flex; align-items: center;
  justify-content: space-between; text-align: left;
}
.curso-nombre { font-size: 13px; font-weight: 500; color: #1a1a2e; flex: 1; margin-right: 12px; }
.btn-acceder {
  background: #1a5fa8; color: white; border: none;
  font-family: 'Outfit', sans-serif; font-size: 12px;
  padding: 7px 16px; border-radius: 8px; cursor: pointer;
  text-decoration: none; white-space: nowrap;
}
.btn-logout {
  background: none; border: 1px solid #eee; color: #bbb;
  font-family: 'Outfit', sans-serif; font-size: 12px;
  padding: 7px 20px; border-radius: 8px; cursor: pointer; margin-top: 8px;
}
.btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }
.verificando { font-size: 13px; color: #aaa; padding: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-letters"><span>O</span><span>P</span><span>M</span></div>
    <div class="brand-sub">Academia</div>
    <div class="brand-line"></div>
  </div>

  <div id="login-view">
    <p class="login-heading">Tu espacio de formación</p>
    <p class="login-sub">Iniciá sesión con tu cuenta Google<br>para acceder a los cursos</p>
    <div id="google-btn-container">
      <div id="g_id_onload"
        data-client_id="1003206709363-7f7ajssnb3qcituof8reiqditjck3sfj.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard" data-size="large" data-theme="outline"
        data-text="signin_with" data-shape="rectangular"
        data-locale="es" data-logo_alignment="left" data-width="280">
      </div>
    </div>
    <p class="footer-note">Osiscka · Ponce Laso · Morales</p>
  </div>

  <div id="verificando-view" style="display:none;">
    <p class="verificando">Verificando acceso...</p>
  </div>

  <div id="perfil">
    <div class="avatar-wrap">
      <img id="user-avatar" src="" alt="Foto de perfil" class="user-avatar"/>
      <div class="avatar-check">✓</div>
    </div>
    <div class="welcome-tag">Bienvenido/a</div>
    <p id="user-name" class="user-name"></p>
    <p id="user-email" class="user-email"></p>
    <p class="cursos-titulo">Tus cursos</p>
    <div id="cursos-lista" class="cursos-lista"></div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div id="no-acceso">
    <div class="no-acceso-icon">🔒</div>
    <p class="no-acceso-title">Acceso no habilitado</p>
    <p class="no-acceso-sub">Tu pago aún no fue confirmado.<br>Completá el pago para acceder a los cursos.</p>
    <a href="https://link.mercadopago.com.ar/academiaopm" class="btn-pagar" target="_blank">Ir al pago</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzm3axMvxQvcrLCcOenI5YzpXceQNaq1gDWSZQQX98Cj7T5L4QqtKtJk7XdWeuz8Lbx-w/exec";

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  const json = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(json);
}

function mostrarCursos(cursos) {
  const lista = document.getElementById('cursos-lista');
  lista.innerHTML = '';
  cursos.forEach(function(curso) {
    const card = document.createElement('div');
    card.className = 'curso-card';
    card.innerHTML = '<span class="curso-nombre">' + curso.nombre + '</span>' +
      '<a href="' + curso.link + '" target="_blank" class="btn-acceder">Acceder</a>';
    lista.appendChild(card);
  });
}

function mostrarPerfil(name, email, picture, cursos) {
  document.getElementById('user-avatar').src = picture;
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-email').textContent = email;
  mostrarCursos(cursos);
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('verificando-view').style.display = 'none';
  document.getElementById('no-acceso').style.display = 'none';
  document.getElementById('perfil').style.display = 'flex';
}

function mostrarNoAcceso() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('verificando-view').style.display = 'none';
  document.getElementById('perfil').style.display = 'none';
  document.getElementById('no-acceso').style.display = 'flex';
}

async function verificarAcceso(name, email, picture) {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('verificando-view').style.display = 'block';
  try {
    const res = await fetch(WEBAPP_URL + "?email=" + encodeURIComponent(email), {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.habilitado) {
      mostrarPerfil(name, email, picture, data.cursos);
    } else {
      mostrarNoAcceso();
    }
  } catch(e) {
    console.log('Error verificando acceso:', e);
    mostrarNoAcceso();
  }
}

function handleCredentialResponse(response) {
  const user = parseJwt(response.credential);
  sessionStorage.setItem('opm_user', JSON.stringify({
    name: user.name, email: user.email, picture: user.picture
  }));
  verificarAcceso(user.name, user.email, user.picture);
}

function logout() {
  sessionStorage.removeItem('opm_user');
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('perfil').style.display = 'none';
  document.getElementById('no-acceso').style.display = 'none';
  document.getElementById('verificando-view').style.display = 'none';
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
}

window.addEventListener('load', function() {
  const saved = sessionStorage.getItem('opm_user');
  if (saved) {
    const u = JSON.parse(saved);
    verificarAcceso(u.name, u.email, u.picture);
  }
});
</script>
</body>
</html>
